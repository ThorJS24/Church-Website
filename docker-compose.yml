version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: grace_church_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: grace_church
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - church_network

  app:
    build: .
    container_name: grace_church_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/grace_church?authSource=admin
    depends_on:
      - mongodb
    networks:
      - church_network

volumes:
  mongodb_data:

networks:
  church_network:
    driver: bridge